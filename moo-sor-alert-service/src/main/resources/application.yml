spring:
  application:
    name: moo-sor-alert-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
  data:
    mongodb:
      uri: mongodb://localhost:27017/moo
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      linger-ms: 5
      compression-type: lz4
      properties:
        max.block.ms: 5000

moo:
  market-data:
    base-url: http://localhost:8081
    cache:
      max-size: 5000
      ttl-seconds: 30
  kafka:
    topic: moo-customer-alerts
  thread-pool:
    core-size: 50
    max-size: 200
    queue-capacity: 50000

resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 100
        minimum-number-of-calls: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 10
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      marketData:
        base-config: default
        sliding-window-size: 50
        failure-rate-threshold: 40
        wait-duration-in-open-state: 15s
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80
      mongoLookup:
        base-config: default
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 90
      kafkaPublish:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 80

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: moo-sor-alert-service

server:
  port: 8080

logging:
  level:
    com.bank.moo: INFO
    org.springframework.kafka: WARN
    org.mongodb: WARN

---
# Flat MongoDB profile - activated with: --spring.profiles.active=mongo-flat
# Uses one document per subscription instead of one document per customer
spring:
  config:
    activate:
      on-profile: mongo-flat
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
  data:
    mongodb:
      uri: mongodb://localhost:27017/moo

---
# Oracle profile - activated with: --spring.profiles.active=oracle
spring:
  config:
    activate:
      on-profile: oracle
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: moo
    password: moo_password
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.OracleDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
