version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: moo-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    command: mongod --wiredTigerCacheSizeGB 2

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: moo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: moo-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_MESSAGE_MAX_BYTES: 1048576

  mock-market-data:
    build:
      context: ./mock-market-data
      dockerfile: Dockerfile
    container_name: moo-mock-market-data
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      RESPONSE_DELAY_MS: 0

  # MOO SOR instances for multi-instance load testing
  moo-sor-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moo-sor-1
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - kafka
      - mock-market-data
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/moo
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MOO_MARKET_DATA_BASE_URL: http://mock-market-data:8081
      SERVER_PORT: 8080

  moo-sor-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moo-sor-2
    ports:
      - "8082:8080"
    depends_on:
      - mongodb
      - kafka
      - mock-market-data
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/moo
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MOO_MARKET_DATA_BASE_URL: http://mock-market-data:8081
      SERVER_PORT: 8080

  moo-sor-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moo-sor-3
    ports:
      - "8083:8080"
    depends_on:
      - mongodb
      - kafka
      - mock-market-data
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/moo
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MOO_MARKET_DATA_BASE_URL: http://mock-market-data:8081
      SERVER_PORT: 8080

  moo-sor-4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moo-sor-4
    ports:
      - "8084:8080"
    depends_on:
      - mongodb
      - kafka
      - mock-market-data
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/moo
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MOO_MARKET_DATA_BASE_URL: http://mock-market-data:8081
      SERVER_PORT: 8080

volumes:
  mongo-data:
